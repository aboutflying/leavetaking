<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Political Purchaser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #212121;
    }
    .header {
      background: #1a237e;
      color: #fff;
      padding: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .header p {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
    }
    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
    }
    .section h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #757575;
      margin-bottom: 8px;
    }
    .issue-list {
      list-style: none;
    }
    .issue-list li {
      display: flex;
      align-items: center;
      padding: 4px 0;
    }
    .issue-list label {
      margin-left: 8px;
      cursor: pointer;
      flex: 1;
    }
    .scorecard-list {
      list-style: none;
    }
    .scorecard-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .scorecard-list .perspective {
      font-size: 11px;
      color: #9e9e9e;
    }
    .actions {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-primary {
      background: #1a237e;
      color: #fff;
    }
    .btn-secondary {
      background: #e0e0e0;
      color: #424242;
    }
    .status {
      padding: 8px 16px;
      font-size: 12px;
      color: #757575;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Political Purchaser</h1>
    <p>Configure which issues matter to you</p>
  </div>

  <div class="section">
    <h2>Issues to Track</h2>
    <ul class="issue-list" id="issueList"></ul>
  </div>

  <div class="section">
    <h2>Trusted Scorecards</h2>
    <ul class="scorecard-list" id="scorecardList"></ul>
  </div>

  <div class="section">
    <h2>Display</h2>
    <label>
      <input type="checkbox" id="showLowConfidence"> Show low-confidence scores
    </label>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="saveBtn">Save Preferences</button>
    <button class="btn btn-secondary" id="refreshBtn">Refresh Data</button>
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
