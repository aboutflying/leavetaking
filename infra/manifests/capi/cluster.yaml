# Template: envsubst'd by bootstrap script before applying.
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: ${CLUSTER_NAME}
  namespace: default
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - "192.168.0.0/16"
    services:
      cidrBlocks:
        - "172.16.0.0/12"
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1alpha3
    kind: TalosControlPlane
    name: ${CLUSTER_NAME}-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: AzureCluster
    name: ${CLUSTER_NAME}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureCluster
metadata:
  name: ${CLUSTER_NAME}
  namespace: default
spec:
  identityRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: AzureClusterIdentity
    name: cluster-identity
  location: ${AZURE_LOCATION}
  resourceGroup: ${RESOURCE_GROUP}
  subscriptionID: ${AZURE_SUBSCRIPTION_ID}
  networkSpec:
    vnet:
      name: ${CLUSTER_NAME}-network-vnet
      cidrBlocks:
        - "10.0.0.0/16"
      resourceGroup: ${RESOURCE_GROUP}
    subnets:
      - name: control-plane-subnet
        role: control-plane
        cidrBlocks:
          - "10.0.1.0/24"
        securityGroup:
          name: ${CLUSTER_NAME}-network-nsg-cp
      - name: node-subnet
        role: node
        cidrBlocks:
          - "10.0.2.0/24"
        securityGroup:
          name: ${CLUSTER_NAME}-network-nsg-workers
    apiServerLB:
      type: Public
      name: ${CLUSTER_NAME}-api-lb
      sku: Standard
      frontendIPs:
        - name: ${CLUSTER_NAME}-api-lb-ip
          publicIP:
            name: ${CLUSTER_NAME}-api-lb-pip
            dnsName: ${CLUSTER_NAME}-apiserver
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureClusterIdentity
metadata:
  name: cluster-identity
  namespace: default
spec:
  type: ServicePrincipal
  tenantID: ${AZURE_TENANT_ID}
  clientID: ${AZURE_CLIENT_ID}
  clientSecret:
    name: azure-cluster-identity-secret
    namespace: default
  allowedNamespaces: {}
